<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>课程表 · 新布局</title>
  <!-- 使用简洁的 Tailwind 风格，但全部内联，无需额外依赖 -->
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f8fafc;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      padding: 1rem;
    }

    /* 重新设计的卡片 —— 更柔和的阴影，圆角更大，呼吸感更强 */
    .card-redesign {
      background: #ffffff;
      border-radius: 28px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.06), 0 4px 10px rgba(0, 0, 0, 0.02);
      max-width: 820px;
      width: 100%;
      transition: box-shadow 0.2s;
      overflow: hidden;
      border: 1px solid rgba(226, 232, 240, 0.5);
    }

    /* 滚动容器 — 保留横向滚动，体验舒适 */
    .schedule-scroll {
      overflow-x: auto;
      padding: 0.25rem 0.25rem 0.25rem 0.25rem;
      scrollbar-width: thin;
      scrollbar-color: #d1d9e6 #f1f4f9;
      -webkit-overflow-scrolling: touch;
    }

    .schedule-scroll::-webkit-scrollbar {
      height: 6px;
    }
    .schedule-scroll::-webkit-scrollbar-track {
      background: #f1f4f9;
      border-radius: 20px;
    }
    .schedule-scroll::-webkit-scrollbar-thumb {
      background: #d1d9e6;
      border-radius: 20px;
    }

    /* 网格 —— 全新布局，更清爽，行间距舒适 */
    .schedule-grid-new {
      display: grid;
      grid-template-columns: 70px repeat(7, 1fr);
      gap: 2px 3px;
      min-width: 620px;
      font-size: 12px;
    }

    /* 所有格子统一样式 */
    .grid-cell {
      background: #fafcff;
      border-radius: 14px;
      padding: 6px 4px;
      min-height: 48px;
      transition: background 0.1s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
      border: 1px solid transparent;
    }

    /* 时间列 —— 更突出，保留精致感 */
    .time-cell {
      background: #f6f9ff;
      color: #1e293b;
      font-weight: 500;
      font-size: 11px;
      letter-spacing: 0.01em;
      border-radius: 16px;
      padding: 6px 2px;
      justify-content: center;
      align-items: center;
      display: flex;
      flex-direction: column;
      line-height: 1.3;
    }

    .time-cell span {
      display: inline-block;
      white-space: nowrap;
    }

    /* 星期头部 — 圆润且清晰 */
    .head-cell {
      background: #f8fafc;
      font-weight: 600;
      color: #1e293b;
      font-size: 12px;
      letter-spacing: 0.3px;
      border-radius: 30px;
      padding: 8px 0;
      min-height: 40px;
      background: #f6f9ff;
    }

    .head-today {
      background: #eef4ff;
      color: #1d4ed8;
      box-shadow: inset 0 1px 2px rgba(29, 78, 216, 0.06);
    }

    /* 课程卡片 — 全新紧凑+柔和风格 */
    .lesson-block {
      width: 100%;
      background: white;
      border-radius: 20px;
      padding: 6px 6px 6px 8px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.02), 0 1px 2px rgba(0, 0, 0, 0.03);
      border: 1px solid #eef2f8;
      transition: all 0.1s;
      text-align: left;
      display: flex;
      flex-direction: column;
      line-height: 1.2;
      cursor: default;
    }

    .lesson-block:hover {
      background: #f9fcff;
      border-color: #d7e2f0;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.02);
    }

    .lesson-title {
      display: flex;
      align-items: center;
      gap: 5px;
      font-weight: 500;
      font-size: 12px;
      color: #0b1e33;
    }

    .color-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 6px;
      flex-shrink: 0;
    }

    .lesson-location {
      font-size: 10px;
      color: #64748b;
      margin-top: 2px;
      padding-left: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .empty-dot {
      color: #d4dce8;
      font-size: 14px;
      letter-spacing: 2px;
      opacity: 0.7;
    }

    /* 底部工具栏 — 重新设计，更现代 */
    .toolbar-new {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 20px 16px 20px;
      background: #fafcff;
      border-top: 1px solid #eef2f8;
      flex-wrap: wrap;
      gap: 8px;
    }

    .btn-outline {
      background: transparent;
      border: 1px solid #d7e0ea;
      color: #1e293b;
      padding: 6px 16px;
      border-radius: 40px;
      font-size: 12px;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: 0.15s;
      cursor: pointer;
      background: white;
      box-shadow: 0 1px 2px rgba(0,0,0,0.02);
    }

    .btn-outline:hover {
      background: #f1f7fe;
      border-color: #b8cee8;
    }

    .btn-primary-new {
      background: #1e293b;
      border: 1px solid #1e293b;
      color: white;
      padding: 6px 20px;
      border-radius: 40px;
      font-size: 12px;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: 0.15s;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.04);
    }

    .btn-primary-new:hover {
      background: #0f1a2b;
      border-color: #0f1a2b;
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.06);
    }

    .btn-icon {
      font-size: 14px;
      line-height: 1;
    }

    /* 调整今天高亮列 */
    .today-col {
      background: #f3f9ff;
      border-radius: 14px;
    }

    /* 紧凑适配 */
    @media (max-width: 500px) {
      .schedule-grid-new {
        font-size: 11px;
        grid-template-columns: 56px repeat(7, 1fr);
        gap: 2px;
        min-width: 480px;
      }
      .lesson-title {
        font-size: 10px;
      }
      .time-cell {
        font-size: 10px;
        padding: 4px 0;
      }
      .toolbar-new {
        padding: 12px 12px 14px;
      }
    }
  </style>
</head>
<body>
  <div class="card-redesign">
    <!-- 滚动容器 -->
    <div class="schedule-scroll">
      <div class="schedule-grid-new">
        <!-- 左上角 “时间” 头部 -->
        <div class="grid-cell head-cell">
          时间
        </div>
        <!-- 星期头部 一 ~ 日 -->
        <div class="grid-cell head-cell" style="grid-column: 2 / 3; grid-row: 1 / 2;">一</div>
        <div class="grid-cell head-cell" style="grid-column: 3 / 4; grid-row: 1 / 2;">二</div>
        <div class="grid-cell head-cell" style="grid-column: 4 / 5; grid-row: 1 / 2;">三</div>
        <div class="grid-cell head-cell" style="grid-column: 5 / 6; grid-row: 1 / 2;">四</div>
        <div class="grid-cell head-cell head-today" style="grid-column: 6 / 7; grid-row: 1 / 2;">五</div>
        <div class="grid-cell head-cell" style="grid-column: 7 / 8; grid-row: 1 / 2;">六</div>
        <div class="grid-cell head-cell" style="grid-column: 8 / 9; grid-row: 1 / 2;">日</div>

        <!-- 时间行 08:00~10:00 -->
        <div class="grid-cell time-cell" style="grid-column: 1 / 2; grid-row: 2 / 3;"><span>08:00<br>10:00</span></div>
        <div class="grid-cell" style="grid-column: 2 / 3; grid-row: 2 / 3;"><div class="lesson-block"><div class="lesson-title"><span class="color-dot" style="background:#ec4899;"></span><span>数学</span></div><div class="lesson-location">学之乐</div></div></div>
        <div class="grid-cell" style="grid-column: 3 / 4; grid-row: 2 / 3;"><span class="empty-dot">·</span></div>
        <div class="grid-cell" style="grid-column: 4 / 5; grid-row: 2 / 3;"><span class="empty-dot">·</span></div>
        <div class="grid-cell" style="grid-column: 5 / 6; grid-row: 2 / 3;"><div class="lesson-block"><div class="lesson-title"><span class="color-dot" style="background:#ec4899;"></span><span>数学</span></div><div class="lesson-location">学之乐</div></div></div>
        <div class="grid-cell today-col" style="grid-column: 6 / 7; grid-row: 2 / 3;"><span class="empty-dot">·</span></div>
        <div class="grid-cell" style="grid-column: 7 / 8; grid-row: 2 / 3;"><div class="lesson-block"><div class="lesson-title"><span class="color-dot" style="background:#ec4899;"></span><span>数学</span></div><div class="lesson-location">学之乐</div></div></div>
        <div class="grid-cell" style="grid-column: 8 / 9; grid-row: 2 / 3;"><span class="empty-dot">·</span></div>

        <!-- 时间行 08:30~08:50 -->
        <div class="grid-cell time-cell" style="grid-column: 1 / 2; grid-row: 3 / 4;"><span>08:30<br>08:50</span></div>
        <div class="grid-cell" style="grid-column: 2 / 3; grid-row: 3 / 4;"><span class="empty-dot">·</span></div>
        <div class="grid-cell" style="grid-column: 3 / 4; grid-row: 3 / 4;"><span class="empty-dot">·</span></div>
        <div class="grid-cell" style="grid-column: 4 / 5; grid-row: 3 / 4;"><span class="empty-dot">·</span></div>
        <div class="grid-cell" style="grid-column: 5 / 6; grid-row: 3 / 4;"><span class="empty-dot">·</span></div>
        <div class="grid-cell today-col" style="grid-column: 6 / 7; grid-row: 3 / 4;"><div class="lesson-block"><div class="lesson-title"><span class="color-dot" style="background:#6366f1;"></span><span>英语作业</span></div><div class="lesson-location">家里</div></div></div>
        <div class="grid-cell" style="grid-column: 7 / 8; grid-row: 3 / 4;"><span class="empty-dot">·</span></div>
        <div class="grid-cell" style="grid-column: 8 / 9; grid-row: 3 / 4;"><span class="empty-dot">·</span></div>

        <!-- 时间行 09:00~12:00 -->
        <div class="grid-cell time-cell" style="grid-column: 1 / 2; grid-row: 4 / 5;"><span>09:00<br>12:00</span></div>
        <div class="grid-cell" style="grid-column: 2 / 3; grid-row: 4 / 5;"><div class="lesson-block"><div class="lesson-title"><span class="color-dot" style="background:#22c55e;"></span><span>绘画</span></div><div class="lesson-location">上圆</div></div></div>
        <div class="grid-cell" style="grid-column: 3 / 4; grid-row: 4 / 5;"><span class="empty-dot">·</span></div>
        <div class="grid-cell" style="grid-column: 4 / 5; grid-row: 4 / 5;"><div class="lesson-block"><div class="lesson-title"><span class="color-dot" style="background:#22c55e;"></span><span>绘画</span></div><div class="lesson-location">上圆</div></div></div>
        <div class="grid-cell" style="grid-column: 5 / 6; grid-row: 4 / 5;"><span class="empty-dot">·</span></div>
        <div class="grid-cell today-col" style="grid-column: 6 / 7; grid-row: 4 / 5;"><div class="lesson-block"><div class="lesson-title"><span class="color-dot" style="background:#22c55e;"></span><span>绘画</span></div><div class="lesson-location">上圆</div></div></div>
        <div class="grid-cell" style="grid-column: 7 / 8; grid-row: 4 / 5;"><span class="empty-dot">·</span></div>
        <div class="grid-cell" style="grid-column: 8 / 9; grid-row: 4 / 5;"><span class="empty-dot">·</span></div>

        <!-- 时间行 15:10~17:10 -->
        <div class="grid-cell time-cell" style="grid-column: 1 / 2; grid-row: 5 / 6;"><span>15:10<br>17:10</span></div>
        <div class="grid-cell" style="grid-column: 2 / 3; grid-row: 5 / 6;"><div class="lesson-block"><div class="lesson-title"><span class="color-dot" style="background:#14b8a6;"></span><span>英语</span></div><div class="lesson-location">学之乐</div></div></div>
        <div class="grid-cell" style="grid-column: 3 / 4; grid-row: 5 / 6;"><div class="lesson-block"><div class="lesson-title"><span class="color-dot" style="background:#3b82f6;"></span><span>语文</span></div><div class="lesson-location">学之乐</div></div></div>
        <div class="grid-cell" style="grid-column: 4 / 5; grid-row: 5 / 6;"><div class="lesson-block"><div class="lesson-title"><span class="color-dot" style="background:#14b8a6;"></span><span>英语</span></div><div class="lesson-location">学之乐</div></div></div>
        <div class="grid-cell" style="grid-column: 5 / 6; grid-row: 5 / 6;"><div class="lesson-block"><div class="lesson-title"><span class="color-dot" style="background:#3b82f6;"></span><span>语文</span></div><div class="lesson-location">学之乐</div></div></div>
        <div class="grid-cell today-col" style="grid-column: 6 / 7; grid-row: 5 / 6;"><div class="lesson-block"><div class="lesson-title"><span class="color-dot" style="background:#14b8a6;"></span><span>英语</span></div><div class="lesson-location">学之乐</div></div></div>
        <div class="grid-cell" style="grid-column: 7 / 8; grid-row: 5 / 6;"><div class="lesson-block"><div class="lesson-title"><span class="color-dot" style="background:#3b82f6;"></span><span>语文</span></div><div class="lesson-location">学之乐</div></div></div>
        <div class="grid-cell" style="grid-column: 8 / 9; grid-row: 5 / 6;"><span class="empty-dot">·</span></div>
      </div>
    </div>

    <!-- 底部工具栏 全新设计 -->
    <div class="toolbar-new">
      <button type="button" class="btn-outline">
        <span>🔄</span> 横屏查看
      </button>
      <button type="button" class="btn-primary-new">
        <span>＋</span> 添加时段
      </button>
    </div>
  </div>
</body>
</html>
